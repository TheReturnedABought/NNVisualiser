<!DOCTYPE html>
<html lang="en">

<style>
:root {
  --bg:#0d1117;
  --bg2:#161b22;
  --bg3:#1f2937;
  --border:#30363d;
  --text:#e6edf3;
  --muted:#8b949e;
  --accent:#f0a500;

</head>
<body>

<header>
  <div class="logo">NN viz</div>

  <div class="sep"></div>

  <button class="active" id="btn-xor" onclick="selectDataset('xor')">XOR</button>
  <button id="btn-spiral" onclick="selectDataset('spiral')">Spiral</button>
  <button id="btn-circle" onclick="selectDataset('circle')">Circle</button>
  <button id="btn-moons" onclick="selectDataset('moons')">Moons</button>
  <button id="btn-gaussian" onclick="selectDataset('gaussian')">Gaussian</button>

  <div class="sep"></div>

  <button onclick="addLayer()">+ Layer</button>
  <button onclick="removeLayer()">− Layer</button>

  <div class="ctrl">
    LR
    <input type="range" min="-3" max="0" step="0.1" value="-1" oninput="setLR(this.value)">
  </div>

  <div class="ctrl">
    Speed
    <input type="range" min="1" max="50" value="5" oninput="setSpeed(this.value)">
  </div>

  <div id="class-picker"></div>

  <button onclick="resetAll()">Reset</button>
  <button class="btn-train" onclick="toggleTraining()" id="train-btn">Train</button>
</header>

<main>

<div class="panel">
  <div class="panel-title">Decision Boundary</div>
  <div id="boundary-wrap">
    <canvas id="boundary-canvas"></canvas>
  </div>
</div>

<div class="panel">
  <div class="panel-title">Network Architecture</div>
  <canvas id="network-canvas"></canvas>
</div>

<div class="panel">
  <div class="panel-title">Training Stats</div>

  <div id="stats">
    <div class="stat">
      <div class="stat-label">Epoch</div>
      <div class="stat-value" id="epoch-val">0</div>
    </div>

    <div class="stat">
      <div class="stat-label">Loss</div>
      <div class="stat-value" id="loss-val">—</div>
    </div>

    <div class="stat">
      <div class="stat-label">Accuracy</div>
      <div class="stat-value" id="acc-val">—</div>
    </div>
  </div>

  <canvas id="loss-canvas"></canvas>

  <div class="panel-title" style="margin-top:12px">Weights</div>
  <div id="weights-wrap"></div>
</div>

</main>

<script>
'use strict';

const CLASS_COLORS = [
  '#39d353',
  '#f0a500',
  '#58a6ff',
  '#ff4d6d',
  '#b388ff',
  '#00d4aa'
];

function randn() {
  let u = 0, v = 0;
  while (!u) u = Math.random();
  while (!v) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function xavier(rows, cols) {
  const s = Math.sqrt(2 / (rows + cols));

  return Array.from({ length: rows }, () =>
    Array.from({ length: cols }, () => randn() * s)
  );
}

function sigmoid(x) {
  return 1 / (1 + Math.exp(-x));
}

function relu(x) {
  return Math.max(0, x);
}

function reluDeriv(x) {
  return x > 0 ? 1 : 0;
}

function softmax(arr) {
  const m = Math.max(...arr);
  const exps = arr.map(v => Math.exp(v - m));
  const sum = exps.reduce((a, b) => a + b, 0);
  return exps.map(v => v / sum);
}

class DynamicNet {
  constructor(layerSizes) {
    this.layerSizes = layerSizes;
    this.lr = 0.03;

    this.weights = [];
    this.biases = [];

    for (let i = 0; i < layerSizes.length - 1; i++) {
      this.weights.push(xavier(layerSizes[i + 1], layerSizes[i]));
      this.biases.push(Array(layerSizes[i + 1]).fill(0));
    }
  }

  forward(input) {
    let activations = [input];
    let zs = [];
    let a = input;

    for (let l = 0; l < this.weights.length; l++) {
      const z = this.weights[l].map((row, i) => {
        return row.reduce((s, w, j) => s + w * a[j], 0)
          + this.biases[l][i];
      });

      zs.push(z);

      if (l === this.weights.length - 1) {
        a = z.length === 1 ? [sigmoid(z[0])] : softmax(z);
      } else {
        a = z.map(relu);
      }

      activations.push(a);
    }

    return {
      activations,
      zs,
      output:a
    };
  }

  backward(x, y) {
    const { activations, zs, output } = this.forward(x);

    let delta;

    if (output.length === 1) {
      delta = [output[0] - y];
    } else {
      delta = output.map((v, i) => v - (i === y ? 1 : 0));
    }

    const gradW = this.weights.map(W =>
      W.map(r => r.map(() => 0))
    );

    const gradB = this.biases.map(b => b.map(() => 0));

    let L = this.weights.length - 1;

    for (let i = 0; i < delta.length; i++) {
      gradB[L][i] = delta[i];

      for (let j = 0; j < activations[L].length; j++) {
        gradW[L][i][j] = delta[i] * activations[L][j];
      }
    }

    for (let l = this.weights.length - 2; l >= 0; l--) {
      let next = [];

      for (let i = 0; i < this.layerSizes[l + 1]; i++) {
        let err = 0;

        for (let j = 0; j < delta.length; j++) {
          err += this.weights[l + 1][j][i] * delta[j];
        }

        next[i] = err * reluDeriv(zs[l][i]);
      }

      delta = next;

      for (let i = 0; i < delta.length; i++) {
        gradB[l][i] = delta[i];

        for (let j = 0; j < activations[l].length; j++) {
          gradW[l][i][j] = delta[i] * activations[l][j];
        }
      }
    }

    for (let l = 0; l < this.weights.length; l++) {
      for (let i = 0; i < this.weights[l].length; i++) {
        for (let j = 0; j < this.weights[l][i].length; j++) {
          this.weights[l][i][j] -= this.lr * gradW[l][i][j];
        }

        this.biases[l][i] -= this.lr * gradB[l][i];
      }
    }
  }

  trainEpoch(X, Y) {
    let loss = 0;

    for (let i = 0; i < X.length; i++) {
      const out = this.forward(X[i]).output;

      if (out.length === 1) {
        const p = out[0];
        const y = Y[i];

        loss -= y * Math.log(p + 1e-9)
          + (1 - y) * Math.log(1 - p + 1e-9);
      } else {
        loss -= Math.log(out[Y[i]] + 1e-9);
      }

      this.backward(X[i], Y[i]);
    }

    return loss / X.length;
  }

  predict(x) {
    const out = this.forward(x).output;

    if (out.length === 1) {
      return out[0] > 0.5 ? 1 : 0;
    }

    return out.indexOf(Math.max(...out));
  }

  accuracy(X, Y) {
    let ok = 0;

    for (let i = 0; i < X.length; i++) {
      if (this.predict(X[i]) === Y[i]) ok++;
    }

    return ok / X.length;
  }
}

const DS = {
  xor: {
    X:[[0.1,0.1],[0.1,0.9],[0.9,0.1],[0.9,0.9]],
    Y:[0,1,1,0]
  }
};

(function buildSpiral(){
  const X=[];
  const Y=[];

  for(let i=0;i<80;i++){
    const t=i/80;
    const a=t*Math.PI*4;
    const r=t*0.4;

    X.push([
      0.5+r*Math.cos(a),
      0.5+r*Math.sin(a)
    ]);

    Y.push(0);

    X.push([
      0.5+r*Math.cos(a+Math.PI),
      0.5+r*Math.sin(a+Math.PI)
    ]);

    Y.push(1);
  }

  DS.spiral={X,Y};
})();

(function buildCircle(){
  const X=[];
  const Y=[];

  for(let i=0;i<120;i++){
    const a=Math.random()*Math.PI*2;

    X.push([
      0.5+Math.cos(a)*(0.15+Math.random()*0.05),
      0.5+Math.sin(a)*(0.15+Math.random()*0.05)
    ]);

    Y.push(0);

    const a2=Math.random()*Math.PI*2;

    X.push([
      0.5+Math.cos(a2)*(0.35+Math.random()*0.08),
      0.5+Math.sin(a2)*(0.35+Math.random()*0.08)
    ]);

    Y.push(1);
  }

  DS.circle={X,Y};
})();

(function buildMoons(){
  const X=[];
  const Y=[];

  for(let i=0;i<100;i++){
    const t=Math.random()*Math.PI;

    X.push([
      0.3+Math.cos(t)*0.25,
      0.55+Math.sin(t)*0.25
    ]);

    Y.push(0);

    X.push([
      0.55+Math.cos(t)*0.25,
      0.45-Math.sin(t)*0.25
    ]);

    Y.push(1);
  }

  DS.moons={X,Y};
})();

(function buildGaussian(){
  const X=[];
  const Y=[];

  const centers=[
    [0.25,0.25],
    [0.75,0.25],
    [0.5,0.75]
  ];

  centers.forEach((c,cls)=>{
    for(let i=0;i<80;i++){
      X.push([
        c[0]+randn()*0.06,
        c[1]+randn()*0.06
      ]);

      Y.push(cls);
    }
  });

  DS.gaussian={X,Y};
})();

let hiddenLayers=[6,6];
let currentDS='xor';
let net;
let epoch=0;
let running=false;
let lossHistory=[];
let speed=5;
let selectedClass=0;
let draggedPoint=null;

function getClassCount(){
  return Math.max(...DS[currentDS].Y)+1;
}

function buildNetwork(){
  const out=getClassCount()===2?1:getClassCount();

  net=new DynamicNet([
    2,
    ...hiddenLayers,
    out
  ]);
}

buildNetwork();

const bCanvas=document.getElementById('boundary-canvas');
const bCtx=bCanvas.getContext('2d');

const nCanvas=document.getElementById('network-canvas');
const nCtx=nCanvas.getContext('2d');

const lCanvas=document.getElementById('loss-canvas');
const lCtx=lCanvas.getContext('2d');

function resize(){
  bCanvas.width=bCanvas.parentElement.clientWidth;
  bCanvas.height=bCanvas.parentElement.clientHeight;

  nCanvas.width=nCanvas.parentElement.clientWidth;
  nCanvas.height=nCanvas.parentElement.clientHeight;

  lCanvas.width=lCanvas.offsetWidth;
  lCanvas.height=lCanvas.offsetHeight;

  redraw();
}

window.addEventListener('resize',resize);

function drawBoundary(){
  const W=bCanvas.width;
  const H=bCanvas.height;

  const img=bCtx.createImageData(W,H);

  for(let py=0;py<H;py+=4){
    for(let px=0;px<W;px+=4){
      const x=px/W;
      const y=1-py/H;

      const out=net.forward([x,y]).output;

      let cls;

      if(out.length===1){
        cls=out[0]>0.5?1:0;
      } else {
        cls=out.indexOf(Math.max(...out));
      }

      const hex=CLASS_COLORS[cls%CLASS_COLORS.length];

      const r=parseInt(hex.slice(1,3),16);
      const g=parseInt(hex.slice(3,5),16);
      const b=parseInt(hex.slice(5,7),16);

      for(let dy=0;dy<4;dy++){
        for(let dx=0;dx<4;dx++){
          const i=((py+dy)*W+(px+dx))*4;

          img.data[i]=r;
          img.data[i+1]=g;
          img.data[i+2]=b;
          img.data[i+3]=90;
        }
      }
    }
  }

  bCtx.putImageData(img,0,0);

  const ds=DS[currentDS];

  ds.X.forEach((p,i)=>{
    const x=p[0]*W;
    const y=(1-p[1])*H;

    bCtx.beginPath();
    bCtx.arc(x,y,7,0,Math.PI*2);
    bCtx.fillStyle=CLASS_COLORS[ds.Y[i]];
    bCtx.fill();

    bCtx.strokeStyle='#000';
    bCtx.stroke();
  });
}

function drawNetwork(){
  const W=nCanvas.width;
  const H=nCanvas.height;

  nCtx.clearRect(0,0,W,H);

  const layers=net.layerSizes;

  const xs=layers.map((_,i)=>{
    return 60+i*((W-120)/(layers.length-1));
  });

  function ys(count){
    const s=Math.min(70,(H-80)/count);
    const total=s*(count-1);
    const start=(H-total)/2;

    return Array.from({length:count},(_,i)=>start+i*s);
  }

  const yPos=layers.map(ys);

  for(let l=0;l<net.weights.length;l++){
    for(let i=0;i<net.weights[l].length;i++){
      for(let j=0;j<net.weights[l][i].length;j++){
        const w=net.weights[l][i][j];

        nCtx.beginPath();
        nCtx.moveTo(xs[l],yPos[l][j]);
        nCtx.lineTo(xs[l+1],yPos[l+1][i]);

        nCtx.strokeStyle=w>0
          ? 'rgba(240,165,0,0.5)'
          : 'rgba(88,166,255,0.5)';

        nCtx.lineWidth=Math.abs(w)*1.5+0.3;
        nCtx.stroke();
      }
    }
  }

  for(let l=0;l<layers.length;l++){
    for(let i=0;i<layers[l];i++){
      nCtx.beginPath();
      nCtx.arc(xs[l],yPos[l][i],14,0,Math.PI*2);
      nCtx.fillStyle='#161b22';
      nCtx.fill();
      nCtx.strokeStyle='#f0a500';
      nCtx.stroke();
    }
  }
}

function drawLoss(){
  const W=lCanvas.width;
  const H=lCanvas.height;

  lCtx.clearRect(0,0,W,H);

  if(lossHistory.length<2)return;

  const max=Math.max(...lossHistory);
  const min=Math.min(...lossHistory);

  lCtx.beginPath();

  lossHistory.forEach((v,i)=>{
    const x=(i/(lossHistory.length-1))*W;
    const y=H-(v-min)/(max-min+1e-6)*H;

    if(i===0) lCtx.moveTo(x,y);
    else lCtx.lineTo(x,y);
  });

  lCtx.strokeStyle='#f0a500';
  lCtx.lineWidth=2;
  lCtx.stroke();
}

function renderWeights(){
  const wrap=document.getElementById('weights-wrap');
  wrap.innerHTML='';

  net.weights.forEach((layer,l)=>{
    layer.forEach(row=>{
      const div=document.createElement('div');
      div.className='weight-row';

      row.forEach(w=>{
        const c=document.createElement('div');
        c.className='weight-cell '+(w>0?'pos':'neg');
        c.textContent=w.toFixed(2);
        div.appendChild(c);
      });

      wrap.appendChild(div);
    });
  });
}

function redraw(){
  drawBoundary();
  drawNetwork();
  drawLoss();
  renderWeights();
}

function trainFrame(){
  if(!running)return;

  const ds=DS[currentDS];

  for(let i=0;i<speed;i++){
    const loss=net.trainEpoch(ds.X,ds.Y);

    epoch++;
    lossHistory.push(loss);

    if(lossHistory.length>500){
      lossHistory.shift();
    }

    document.getElementById('epoch-val').textContent=epoch;
    document.getElementById('loss-val').textContent=loss.toFixed(4);
    document.getElementById('acc-val').textContent=
      (net.accuracy(ds.X,ds.Y)*100).toFixed(1)+'%';
  }

  redraw();

  requestAnimationFrame(trainFrame);
}

function toggleTraining(){
  running=!running;

  document.getElementById('train-btn').textContent=
    running?'Pause':'Train';

  if(running){
    trainFrame();
  }
}

function resetAll(){
  epoch=0;
  lossHistory=[];

  buildNetwork();

  document.getElementById('epoch-val').textContent='0';
  document.getElementById('loss-val').textContent='—';
  document.getElementById('acc-val').textContent='—';

  redraw();
}

function selectDataset(name){
  currentDS=name;

  document.querySelectorAll('header button').forEach(b=>{
    b.classList.remove('active');
  });

  const btn=document.getElementById('btn-'+name);

  if(btn) btn.classList.add('active');

  renderClassPicker();
  resetAll();
}

function addLayer(){
  hiddenLayers.push(6);
  resetAll();
}

function removeLayer(){
  if(hiddenLayers.length<=1)return;

  hiddenLayers.pop();
  resetAll();
}

function setLR(v){
  net.lr=Math.pow(10,parseFloat(v));
}

function setSpeed(v){
  speed=parseInt(v);
}

function renderClassPicker(){
  const wrap=document.getElementById('class-picker');

  wrap.innerHTML='';

  const count=getClassCount();

  for(let i=0;i<count;i++){
    const btn=document.createElement('button');

    btn.textContent='Class '+i;
    btn.style.borderColor=CLASS_COLORS[i];

    btn.onclick=()=>{
      selectedClass=i;
      renderClassPicker();
    };

    if(selectedClass===i){
      btn.style.background=CLASS_COLORS[i]+'33';
    }

    wrap.appendChild(btn);
  }
}

bCanvas.addEventListener('mousedown',e=>{
  const rect=bCanvas.getBoundingClientRect();

  const mx=(e.clientX-rect.left)/rect.width;
  const my=1-(e.clientY-rect.top)/rect.height;

  const ds=DS[currentDS];

  for(let i=0;i<ds.X.length;i++){
    const p=ds.X[i];

    if(Math.hypot(p[0]-mx,p[1]-my)<0.04){
      draggedPoint=i;
      return;
    }
  }

  ds.X.push([mx,my]);
  ds.Y.push(selectedClass);

  redraw();
});

window.addEventListener('mousemove',e=>{
  if(draggedPoint===null)return;

  const rect=bCanvas.getBoundingClientRect();

  const mx=(e.clientX-rect.left)/rect.width;
  const my=1-(e.clientY-rect.top)/rect.height;

  DS[currentDS].X[draggedPoint]=[
    Math.max(0,Math.min(1,mx)),
    Math.max(0,Math.min(1,my))
  ];

  redraw();
});

window.addEventListener('mouseup',()=>{
  draggedPoint=null;
});

bCanvas.addEventListener('contextmenu',e=>{
  e.preventDefault();

  const rect=bCanvas.getBoundingClientRect();

  const mx=(e.clientX-rect.left)/rect.width;
  const my=1-(e.clientY-rect.top)/rect.height;

  const ds=DS[currentDS];

  for(let i=0;i<ds.X.length;i++){
    const p=ds.X[i];

    if(Math.hypot(p[0]-mx,p[1]-my)<0.04){
      ds.X.splice(i,1);
      ds.Y.splice(i,1);

      redraw();
      return;
    }
  }
});

renderClassPicker();
resize();
</script>
</body>
</html>
