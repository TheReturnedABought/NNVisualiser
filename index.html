<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Network Visualizer — Thomas Girboux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #1f2937;
  --accent:  #f0a500;
  --accent2: #ffd166;
  --text:    #e6edf3;
  --text2:   #8b949e;
  --border:  #30363d;
  --green:   #39d353;
  --blue:    #58a6ff;
  --red:     #f85149;
  --mono:    'JetBrains Mono', monospace;
  --serif:   'Playfair Display', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ─────────────────────────────── */
header {
  flex-shrink: 0;
  height: 54px;
  background: rgba(13,17,23,0.97);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 1.25rem;
  padding: 0 1.25rem;
  overflow-x: auto;
}

.logo {
  display: flex;
  flex-direction: column;
  gap: 0;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-main {
  font-family: var(--serif);
  font-size: 0.95rem;
  color: var(--accent);
  line-height: 1;
}
.logo-sub {
  font-size: 9px;
  color: var(--text2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

.ds-group { display: flex; gap: 3px; flex-shrink: 0; }
.ds-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.ds-btn.active {
  background: rgba(240,165,0,0.1);
  border-color: var(--accent);
  color: var(--accent);
}
.ds-btn:hover:not(.active) { border-color: var(--text2); color: var(--text); }

.ctrl {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: var(--text2);
  flex-shrink: 0;
}
.ctrl-label { white-space: nowrap; }
.ctrl-val { color: var(--accent); font-weight: 600; min-width: 34px; text-align: right; }

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 72px;
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg);
}

.header-end { margin-left: auto; display: flex; gap: 6px; flex-shrink: 0; }

.btn-reset {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-reset:hover { border-color: var(--text2); color: var(--text); }

.btn-train {
  background: var(--accent);
  border: none;
  color: #000;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 18px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.btn-train:hover { background: var(--accent2); }
.btn-train.running { background: var(--red); color: #fff; }

/* ── Main grid ───────────────────────────── */
main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 260px;
  grid-template-rows: 1fr;
  gap: 1px;
  background: var(--border);
  min-height: 0;
}

.panel {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  padding: 1rem;
  gap: 0.75rem;
  min-height: 0;
  overflow: hidden;
}

.panel-hd {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text2);
}
.panel-hd::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Boundary panel ─────────────────────── */
#boundary-wrap {
  position: relative;
  flex: 1;
  min-height: 0;
  border-radius: 5px;
  overflow: hidden;
}
#boundary-canvas {
  display: block;
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#boundary-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom, transparent 0, transparent 2px,
    rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
}

.legend {
  flex-shrink: 0;
  display: flex;
  gap: 1rem;
  font-size: 10px;
  color: var(--text2);
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }

/* ── Network panel ──────────────────────── */
#network-canvas {
  flex: 1;
  display: block;
  width: 100%;
  min-height: 0;
}

/* ── Stats panel ────────────────────────── */
.stats-grid {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}
.stat-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 8px 10px;
}
.stat-box .lbl { font-size: 9px; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
.stat-box .val { font-size: 15px; font-weight: 600; margin-top: 2px; }
.val-epoch { color: var(--text); }
.val-loss  { color: var(--accent); }
.val-acc   { color: var(--green); }

#loss-canvas {
  flex-shrink: 0;
  display: block;
  width: 100%;
  height: 90px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--bg2);
}

.weights-wrap {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.weights-wrap::-webkit-scrollbar { width: 4px; }
.weights-wrap::-webkit-scrollbar-track { background: transparent; }
.weights-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.w-title {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
}
.w-grid { display: grid; gap: 2px; }
.w-cell {
  font-size: 9.5px;
  padding: 2px 5px;
  border-radius: 3px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  cursor: default;
  transition: background 0.15s;
}
.w-cell:hover { filter: brightness(1.3); }
.w-pos { background: rgba(240,165,0,0.1); color: #f0a500; }
.w-neg { background: rgba(88,166,255,0.1); color: #58a6ff; }

.w-legend {
  display: flex;
  gap: 0.75rem;
  font-size: 9px;
  color: var(--text2);
  flex-shrink: 0;
}
.w-legend span { display: flex; align-items: center; gap: 4px; }
.w-legend .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── Responsive ──────────────────────────── */
@media (max-width: 960px) {
  body { overflow: auto; }
  main {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
  }
  .panel { min-height: 320px; }
  #boundary-wrap { min-height: 280px; }
  header { height: auto; padding: 0.6rem 1rem; flex-wrap: wrap; }
  .header-end { margin-left: 0; }
}
</style>

<!-- ── Script ────────────────────────────── -->
<script>
'use strict';

/* ════════════════════════════════════════════
   NEURAL NETWORK
   ════════════════════════════════════════════ */

function randn() {
  // Box-Muller
  let u = 0, v = 0;
  while (!u) u = Math.random();
  while (!v) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function xavier(rows, cols) {
  const s = Math.sqrt(2 / (rows + cols));
  return Array.from({length: rows}, () =>
    Array.from({length: cols}, () => randn() * s)
  );
}

function zeros(n) { return Array(n).fill(0); }

function sigmoid(x) {
  if (x > 30) return 1 - 1e-10;
  if (x < -30) return 1e-10;
  return 1 / (1 + Math.exp(-x));
}

class Net {
  constructor(hiddenSize) {
    this.H = hiddenSize;
    this.W1 = xavier(this.H, 2);  // H×2
    this.b1 = zeros(this.H);
    this.W2 = xavier(1, this.H);  // 1×H
    this.b2 = zeros(1);
    this.lr  = 0.1;
    this._lastActivations = null;
  }

  forward(x) {
    const H = this.H;
    // z1 = W1 @ x + b1
    const z1 = this.W1.map((row, i) => row[0]*x[0] + row[1]*x[1] + this.b1[i]);
    const a1 = z1.map(sigmoid);
    // z2 = W2 @ a1 + b2
    const z2 = this.W2[0].reduce((s, w, i) => s + w*a1[i], 0) + this.b2[0];
    const a2 = sigmoid(z2);
    return { a1, a2, z1, z2 };
  }

  backward(x, y, cache) {
    const { a1, a2 } = cache;
    const lr = this.lr;

    // dL/dz2 = a2 - y   (BCE + sigmoid simplification)
    const dz2 = a2 - y;

    // W2 gradients
    const dW2 = a1.map(a => dz2 * a);
    const db2 = dz2;

    // Hidden layer gradients
    const da1 = this.W2[0].map(w => dz2 * w);
    const dz1 = da1.map((d, i) => d * a1[i] * (1 - a1[i]));

    // W1 gradients
    const dW1 = dz1.map(dz => x.map(xi => dz * xi));

    // Update
    this.W2 = [this.W2[0].map((w, j) => w - lr * dW2[j])];
    this.b2 = [this.b2[0] - lr * db2];
    this.W1 = this.W1.map((row, i) => row.map((w, j) => w - lr * dW1[i][j]));
    this.b1 = this.b1.map((b, i) => b - lr * dz1[i]);
  }

  trainEpoch(X, Y) {
    let loss = 0;
    // Mini-shuffle
    const idx = X.map((_, i) => i).sort(() => Math.random() - 0.5);
    for (const i of idx) {
      const cache = this.forward(X[i]);
      const p = cache.a2, y = Y[i];
      loss -= y * Math.log(p + 1e-10) + (1-y) * Math.log(1-p + 1e-10);
      this.backward(X[i], y, cache);
    }
    return loss / X.length;
  }

  accuracy(X, Y) {
    let ok = 0;
    for (let i = 0; i < X.length; i++) {
      if ((this.forward(X[i]).a2 > 0.5 ? 1 : 0) === Y[i]) ok++;
    }
    return ok / X.length;
  }
}

/* ════════════════════════════════════════════
   DATASETS
   ════════════════════════════════════════════ */

const DS = {
  xor: {
    X: [[0.08,0.08],[0.08,0.92],[0.92,0.08],[0.92,0.92]],
    Y: [0,1,1,0]
  },
  spiral: null,
  circle: null
};

(function buildSpiral() {
  const X = [], Y = [], n = 50;
  for (let i = 0; i < n; i++) {
    const t = i / n;
    const ang = t * 3.8 * Math.PI;
    const r = 0.07 + t * 0.38;
    const noise = () => (Math.random() - 0.5) * 0.035;
    X.push([0.5 + r*Math.cos(ang)+noise(), 0.5 + r*Math.sin(ang)+noise()]);
    Y.push(0);
    X.push([0.5 + r*Math.cos(ang+Math.PI)+noise(), 0.5 + r*Math.sin(ang+Math.PI)+noise()]);
    Y.push(1);
  }
  DS.spiral = { X, Y };
})();

(function buildCircle() {
  const X = [], Y = [];
  const n = 60;
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * 2 * Math.PI;
    const noise = () => (Math.random() - 0.5) * 0.04;
    // Inner circle: class 0
    const rIn = 0.12 + Math.random() * 0.08;
    X.push([0.5 + rIn*Math.cos(ang)+noise(), 0.5 + rIn*Math.sin(ang)+noise()]);
    Y.push(0);
    // Outer ring: class 1
    const rOut = 0.28 + Math.random() * 0.12;
    const ang2 = Math.random() * 2 * Math.PI;
    X.push([0.5 + rOut*Math.cos(ang2)+noise(), 0.5 + rOut*Math.sin(ang2)+noise()]);
    Y.push(1);
  }
  DS.circle = { X, Y };
})();

/* ════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════ */

let net            = new Net(4);
let currentDS      = 'xor';
let isTraining     = false;
let epoch          = 0;
let lossHistory    = [];
let epochsPerFrame = 8;
let raf            = null;
let sampleIdx      = 0;

/* ════════════════════════════════════════════
   BOUNDARY CANVAS
   ════════════════════════════════════════════ */

const bWrap = document.getElementById('boundary-wrap');
const bCvs  = document.getElementById('boundary-canvas');
const bCtx  = bCvs.getContext('2d');

const BRES  = 130;   // offscreen resolution (pixelated look is intentional)
const offCvs = document.createElement('canvas');
offCvs.width = offCvs.height = BRES;
const offCtx = offCvs.getContext('2d');

function sizeBoundaryCanvas() {
  bCvs.width  = bWrap.clientWidth;
  bCvs.height = bWrap.clientHeight;
}

function drawBoundary() {
  const imgData = offCtx.createImageData(BRES, BRES);
  const ds = DS[currentDS];

  for (let py = 0; py < BRES; py++) {
    for (let px = 0; px < BRES; px++) {
      const x = px / BRES;
      const y = 1 - py / BRES;
      const p = net.forward([x, y]).a2;

      // Class 0: green #39d353  (57,211,83)
      // Class 1: amber #f0a500  (240,165,0)
      const t  = p;
      const r  = Math.round(57  + t * (240 - 57));
      const g  = Math.round(211 + t * (165 - 211));
      const bv = Math.round(83  + t * (0   - 83));
      // Confidence-driven alpha: more confident = more opaque
      const conf = Math.abs(p - 0.5) * 2;
      const alpha = Math.round(80 + conf * 130);

      const idx = (py * BRES + px) * 4;
      imgData.data[idx]     = r;
      imgData.data[idx + 1] = g;
      imgData.data[idx + 2] = bv;
      imgData.data[idx + 3] = alpha;
    }
  }

  offCtx.putImageData(imgData, 0, 0);

  bCtx.clearRect(0, 0, bCvs.width, bCvs.height);
  bCtx.imageSmoothingEnabled = false;
  bCtx.drawImage(offCvs, 0, 0, bCvs.width, bCvs.height);

  // Grid
  bCtx.strokeStyle = 'rgba(48,54,61,0.45)';
  bCtx.lineWidth = 0.5;
  for (let i = 1; i < 4; i++) {
    const gx = (i / 4) * bCvs.width;
    const gy = (i / 4) * bCvs.height;
    bCtx.beginPath(); bCtx.moveTo(gx, 0); bCtx.lineTo(gx, bCvs.height); bCtx.stroke();
    bCtx.beginPath(); bCtx.moveTo(0, gy); bCtx.lineTo(bCvs.width, gy); bCtx.stroke();
  }

  // Data points
  const ds2 = DS[currentDS];
  ds2.X.forEach((pt, i) => {
    const px = pt[0] * bCvs.width;
    const py = (1 - pt[1]) * bCvs.height;
    const r  = Math.max(4, Math.min(8, bCvs.width * 0.018));

    bCtx.beginPath();
    bCtx.arc(px, py, r, 0, Math.PI * 2);
    bCtx.fillStyle = ds2.Y[i] === 0 ? '#39d353' : '#f0a500';
    bCtx.fill();
    bCtx.strokeStyle = 'rgba(13,17,23,0.85)';
    bCtx.lineWidth = 1.5;
    bCtx.stroke();
  });

  // Epoch watermark
  bCtx.fillStyle = 'rgba(139,148,158,0.35)';
  bCtx.font = `11px 'JetBrains Mono'`;
  bCtx.textAlign = 'right';
  bCtx.textBaseline = 'bottom';
  bCtx.fillText(`ep ${epoch}`, bCvs.width - 6, bCvs.height - 4);
}

/* ════════════════════════════════════════════
   NETWORK CANVAS
   ════════════════════════════════════════════ */

const nCvs = document.getElementById('network-canvas');
const nCtx = nCvs.getContext('2d');

function sizeNetworkCanvas() {
  nCvs.width  = nCvs.parentElement.clientWidth - 32;
  nCvs.height = nCvs.parentElement.clientHeight - 80;
}

function drawNetwork() {
  const W = nCvs.width, H = nCvs.height;
  nCtx.clearRect(0, 0, W, H);

  const hidH = net.H;
  const layers = [2, hidH, 1];

  // X positions for each layer
  const xPos = [W * 0.15, W * 0.5, W * 0.85];

  // Y positions — evenly spaced and centered
  function yPositions(count) {
    const maxSpacing = 64, minSpacing = 28;
    const spacing = Math.max(minSpacing, Math.min(maxSpacing, (H - 80) / Math.max(count, 1)));
    const totalH = spacing * (count - 1);
    const startY = (H - totalH) / 2;
    return Array.from({length: count}, (_, i) => startY + i * spacing);
  }

  const inputY  = yPositions(2);
  const hiddenY = yPositions(hidH);
  const outY    = yPositions(1);
  const allY    = [inputY, hiddenY, outY];

  const R = Math.max(10, Math.min(18, 36 - hidH * 2));

  // Get activations for a cycling sample
  const ds = DS[currentDS];
  const sample = ds.X[sampleIdx % ds.X.length];
  const cache = net.forward(sample);
  const acts = [sample, cache.a1, [cache.a2]];

  // ── Draw weight lines ──
  function drawConnection(x1, y1, x2, y2, weight) {
    const maxW = 2.5;
    const strength = Math.tanh(Math.abs(weight) / maxW);
    const alpha = 0.1 + strength * 0.65;
    const lw    = 0.4 + strength * 2.2;

    nCtx.beginPath();
    nCtx.moveTo(x1, y1);
    nCtx.lineTo(x2, y2);
    nCtx.strokeStyle = weight > 0
      ? `rgba(240,165,0,${alpha})`
      : `rgba(88,166,255,${alpha})`;
    nCtx.lineWidth = lw;
    nCtx.stroke();
  }

  // W1: input → hidden
  for (let h = 0; h < hidH; h++) {
    for (let i = 0; i < 2; i++) {
      drawConnection(xPos[0], inputY[i], xPos[1], hiddenY[h], net.W1[h][i]);
    }
  }
  // W2: hidden → output
  for (let h = 0; h < hidH; h++) {
    drawConnection(xPos[1], hiddenY[h], xPos[2], outY[0], net.W2[0][h]);
  }

  // ── Draw neurons ──
  function drawNeuron(x, y, activation, isOutput, label) {
    // Glow
    if (activation > 0.15) {
      const col = isOutput ? (activation > 0.5 ? '240,165,0' : '57,211,83') : '240,165,0';
      const gr = nCtx.createRadialGradient(x, y, 0, x, y, R * 2.8);
      gr.addColorStop(0, `rgba(${col},${activation * 0.35})`);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      nCtx.beginPath();
      nCtx.arc(x, y, R * 2.8, 0, Math.PI * 2);
      nCtx.fillStyle = gr;
      nCtx.fill();
    }

    // Body fill
    const col = isOutput
      ? (activation > 0.5 ? '240,165,0' : '57,211,83')
      : '240,165,0';
    nCtx.beginPath();
    nCtx.arc(x, y, R, 0, Math.PI * 2);
    nCtx.fillStyle = `rgba(${col},${0.08 + activation * 0.35})`;
    nCtx.fill();

    // Border
    nCtx.strokeStyle = `rgba(${col},${0.4 + activation * 0.6})`;
    nCtx.lineWidth = 1.5;
    nCtx.stroke();

    // Label
    nCtx.textAlign = 'center';
    nCtx.textBaseline = 'middle';

    if (label) {
      nCtx.font = `500 11px 'JetBrains Mono'`;
      nCtx.fillStyle = 'rgba(230,237,243,0.85)';
      nCtx.fillText(label, x, y);
    } else {
      nCtx.font = `500 ${R < 13 ? 8 : 9}px 'JetBrains Mono'`;
      nCtx.fillStyle = 'rgba(230,237,243,0.75)';
      nCtx.fillText(activation.toFixed(2), x, y);
    }
  }

  const inputLabels = ['x₁', 'x₂'];
  const outputLabel = null; // show activation for output

  for (let l = 0; l < 3; l++) {
    const yArr = allY[l];
    const actArr = acts[l];
    for (let n = 0; n < yArr.length; n++) {
      const lbl = l === 0 ? inputLabels[n] : null;
      drawNeuron(xPos[l], yArr[n], actArr[n], l === 2, lbl);
    }
  }

  // ── Layer labels ──
  nCtx.textAlign = 'center';
  nCtx.textBaseline = 'alphabetic';
  nCtx.font = `500 9px 'JetBrains Mono'`;
  const layerMeta = [
    {name:'Input', detail:'2 units'},
    {name:'Hidden', detail:`${hidH} units · sigmoid`},
    {name:'Output', detail:'1 unit · sigmoid'}
  ];
  layerMeta.forEach((meta, l) => {
    nCtx.fillStyle = 'rgba(139,148,158,0.6)';
    nCtx.fillText(meta.name, xPos[l], H - 22);
    nCtx.fillStyle = 'rgba(139,148,158,0.4)';
    nCtx.font = `400 8px 'JetBrains Mono'`;
    nCtx.fillText(meta.detail, xPos[l], H - 10);
    nCtx.font = `500 9px 'JetBrains Mono'`;
  });

  // ── Sample input indicator ──
  const dsY = DS[currentDS].Y;
  nCtx.fillStyle = 'rgba(139,148,158,0.4)';
  nCtx.font = `8px 'JetBrains Mono'`;
  nCtx.textAlign = 'left';
  nCtx.textBaseline = 'top';
  const trueLabel = dsY[sampleIdx % dsY.length];
  const predLabel = cache.a2 > 0.5 ? 1 : 0;
  nCtx.fillText(
    `sample ${sampleIdx % ds.X.length}  true:${trueLabel}  pred:${predLabel}`,
    6, 6
  );
}

/* ════════════════════════════════════════════
   LOSS CANVAS
   ════════════════════════════════════════════ */

const lCvs = document.getElementById('loss-canvas');
const lCtx = lCvs.getContext('2d');

function sizeLossCanvas() {
  lCvs.width  = lCvs.offsetWidth;
  lCvs.height = lCvs.offsetHeight;
}

function drawLoss() {
  const W = lCvs.width, H = lCvs.height;
  lCtx.clearRect(0, 0, W, H);

  if (lossHistory.length < 2) {
    lCtx.fillStyle = 'rgba(139,148,158,0.3)';
    lCtx.font = `10px 'JetBrains Mono'`;
    lCtx.textAlign = 'center';
    lCtx.textBaseline = 'middle';
    lCtx.fillText('Press ▶ Train to start', W/2, H/2);
    return;
  }

  const pd = { t: 8, r: 8, b: 16, l: 30 };
  const pw = W - pd.l - pd.r;
  const ph = H - pd.t - pd.b;

  const maxL = Math.max(...lossHistory, 0.05);
  const minL = Math.min(...lossHistory);
  const range = maxL - minL || 0.01;

  // Grid lines + y-axis labels
  for (let i = 0; i <= 2; i++) {
    const ty = pd.t + (i / 2) * ph;
    lCtx.strokeStyle = 'rgba(48,54,61,0.5)';
    lCtx.lineWidth = 0.5;
    lCtx.beginPath(); lCtx.moveTo(pd.l, ty); lCtx.lineTo(pd.l + pw, ty); lCtx.stroke();
    lCtx.fillStyle = 'rgba(139,148,158,0.55)';
    lCtx.font = `8px 'JetBrains Mono'`;
    lCtx.textAlign = 'right';
    lCtx.textBaseline = 'middle';
    lCtx.fillText((maxL - (i/2)*range).toFixed(2), pd.l - 3, ty);
  }

  // Loss line
  const step = Math.max(1, Math.floor(lossHistory.length / (pw * 1.5)));
  let first = true;
  lCtx.beginPath();
  lossHistory.forEach((loss, i) => {
    if (i % step !== 0 && i !== lossHistory.length - 1) return;
    const tx = pd.l + (i / (lossHistory.length - 1)) * pw;
    const ty = pd.t + (1 - (loss - minL) / range) * ph;
    first ? (lCtx.moveTo(tx, ty), first = false) : lCtx.lineTo(tx, ty);
  });
  lCtx.strokeStyle = '#f0a500';
  lCtx.lineWidth = 1.5;
  lCtx.lineJoin = 'round';
  lCtx.stroke();

  // Current loss dot
  const lastLoss = lossHistory[lossHistory.length - 1];
  const dotX = pd.l + pw;
  const dotY = pd.t + (1 - (lastLoss - minL) / range) * ph;
  lCtx.beginPath();
  lCtx.arc(dotX, dotY, 3, 0, Math.PI * 2);
  lCtx.fillStyle = '#f0a500';
  lCtx.fill();

  // Epoch label
  lCtx.fillStyle = 'rgba(139,148,158,0.4)';
  lCtx.font = `8px 'JetBrains Mono'`;
  lCtx.textAlign = 'right';
  lCtx.textBaseline = 'top';
  lCtx.fillText(`${epoch} epochs`, pd.l + pw, pd.t + ph + 2);
}

/* ════════════════════════════════════════════
   WEIGHTS DISPLAY
   ════════════════════════════════════════════ */

function renderWeights() {
  const wrap = document.getElementById('weights-wrap');
  wrap.innerHTML = '';

  function section(title, matrix, colLabels, rowLabels) {
    const titleEl = document.createElement('div');
    titleEl.className = 'w-title';
    titleEl.textContent = title;
    wrap.appendChild(titleEl);

    const grid = document.createElement('div');
    grid.className = 'w-grid';
    grid.style.gridTemplateColumns = `repeat(${matrix[0].length}, 1fr)`;

    matrix.forEach((row, i) => {
      row.forEach((val, j) => {
        const cell = document.createElement('div');
        cell.className = `w-cell ${val >= 0 ? 'w-pos' : 'w-neg'}`;
        cell.textContent = val.toFixed(3);
        cell.title = `${title}[${i}][${j}] = ${val.toFixed(6)}`;
        grid.appendChild(cell);
      });
    });
    wrap.appendChild(grid);
  }

  section('W1  (hidden × input)', net.W1);
  section('b1  (hidden bias)', [net.b1]);
  section('W2  (output × hidden)', net.W2);
  section('b2  (output bias)', [net.b2]);
}

/* ════════════════════════════════════════════
   TRAINING LOOP
   ════════════════════════════════════════════ */

function frame() {
  if (!isTraining) return;

  const ds = DS[currentDS];
  let lastLoss;
  for (let i = 0; i < epochsPerFrame; i++) {
    lastLoss = net.trainEpoch(ds.X, ds.Y);
    epoch++;
    lossHistory.push(lastLoss);
    if (lossHistory.length > 3000) lossHistory = lossHistory.slice(1000);
  }

  sampleIdx = Math.floor(epoch / 4);

  const acc = net.accuracy(ds.X, ds.Y);
  document.getElementById('disp-epoch').textContent = epoch.toLocaleString();
  document.getElementById('disp-loss').textContent  = lastLoss.toFixed(4);
  document.getElementById('disp-acc').textContent   = (acc * 100).toFixed(1) + '%';

  drawBoundary();
  drawNetwork();
  drawLoss();
  renderWeights();

  raf = requestAnimationFrame(frame);
}

/* ════════════════════════════════════════════
   CONTROLS
   ════════════════════════════════════════════ */

function toggleTraining() {
  isTraining = !isTraining;
  const btn = document.getElementById('btn-train');
  if (isTraining) {
    btn.textContent = '⏸ Pause';
    btn.classList.add('running');
    frame();
  } else {
    btn.textContent = '▶ Train';
    btn.classList.remove('running');
    if (raf) cancelAnimationFrame(raf);
  }
}

function resetAll() {
  isTraining = false;
  const btn = document.getElementById('btn-train');
  btn.textContent = '▶ Train';
  btn.classList.remove('running');
  if (raf) cancelAnimationFrame(raf);

  epoch = 0;
  sampleIdx = 0;
  lossHistory = [];

  const lr = net.lr;
  net = new Net(parseInt(document.getElementById('h-val').textContent));
  net.lr = lr;

  document.getElementById('disp-epoch').textContent = '0';
  document.getElementById('disp-loss').textContent  = '—';
  document.getElementById('disp-acc').textContent   = '—';

  redraw();
}

function selectDataset(name) {
  currentDS = name;
  document.querySelectorAll('.ds-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
  resetAll();
}

function onLRChange(v) {
  const lr = Math.pow(10, parseFloat(v));
  net.lr = lr;
  document.getElementById('lr-val').textContent = lr < 0.1 ? lr.toExponential(1) : lr.toFixed(2);
}

function onHiddenChange(v) {
  document.getElementById('h-val').textContent = v;
  resetAll();
}

function onSpeedChange(v) {
  epochsPerFrame = parseInt(v);
  document.getElementById('spd-val').textContent = v + '×';
}

/* ════════════════════════════════════════════
   RESIZE & INIT
   ════════════════════════════════════════════ */

function redraw() {
  drawBoundary();
  drawNetwork();
  drawLoss();
  renderWeights();
}

function resize() {
  sizeBoundaryCanvas();
  sizeNetworkCanvas();
  sizeLossCanvas();
  redraw();
}

window.addEventListener('resize', () => {
  clearTimeout(window._resizeTimer);
  window._resizeTimer = setTimeout(resize, 80);
});

// Boot
setTimeout(() => {
  resize();
}, 120);
</script>
